<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>簡報預覽</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css">
<link rel="stylesheet" href="shared/slides-core.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rajgoel/reveal.js-plugins@master/chalkboard/style.css">
<style>
#toc-btn {
    position: fixed; top: 12px; right: 150px; z-index: 99999;
    padding: .45em 1em; background: #fff; color: #1a1a1a;
    border: 1px solid #aaa; border-radius: 6px; cursor: pointer;
    font-size: .85em; font-family: inherit;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
}
#toc-btn:hover, #toc-btn:focus { background: #e8f0fe; outline: 2px solid #1565c0; outline-offset: 2px; }
#toc-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 99997;
}
#toc-panel {
    position: fixed; left: 0; top: 0; bottom: 0; width: 300px; max-width: 80vw;
    background: #fff; z-index: 99998; overflow-y: auto;
    box-shadow: 3px 0 14px rgba(0,0,0,.25);
}
#toc-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; background: #1b5e20; color: #fff;
    position: sticky; top: 0; z-index: 1;
}
#toc-header span { font-size: .9em; font-weight: 700; }
#toc-close {
    background: none; border: none; color: #fff; cursor: pointer;
    font-size: 1.1em; padding: 2px 7px; border-radius: 4px; line-height: 1;
}
#toc-close:hover { background: rgba(255,255,255,.25); }
#toc-list { list-style: none; padding: 0; margin: 0; }
#toc-list button {
    display: flex; align-items: baseline; gap: 8px; width: 100%;
    text-align: left; padding: 8px 14px;
    border: none; border-bottom: 1px solid #f0f0f0;
    background: none; cursor: pointer;
    font-size: .82em; font-family: inherit; line-height: 1.45;
}
#toc-list button:hover { background: #e8f5e9; }
#toc-list button.toc-current { background: #e8f5e9; font-weight: 700; color: #1b5e20; }
.toc-num { color: #aaa; font-size: .85em; min-width: 2.4em; flex-shrink: 0; }
/* lightbox */
#img-lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 999999;
    background: rgba(0,0,0,.88);
    align-items: center; justify-content: center;
    cursor: zoom-out;
}
#img-lightbox.open { display: flex; }
#img-lightbox img {
    max-width: 95vw; max-height: 95vh;
    border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
    pointer-events: none;
}
.reveal .slides img { cursor: default; }
</style>
</head>
<body>

<nav aria-label="簡報操作說明" class="sr-only">
    <p>這是一份投影片簡報。若使用螢幕閱讀器，建議按右上角「切換閱讀版」按鈕以一般網頁方式閱讀。</p>
</nav>
<div id="a11y-live" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<button id="toc-btn" aria-expanded="false" aria-controls="toc-panel">標題列表</button>
<button id="toggle-reading" aria-pressed="false">切換閱讀版</button>

<div id="toc-overlay" hidden></div>
<nav id="toc-panel" hidden aria-label="投影片標題列表">
    <div id="toc-header">
        <span>投影片列表</span>
        <button id="toc-close" aria-label="關閉列表">✕</button>
    </div>
    <ol id="toc-list"></ol>
</nav>

<div class="reveal">
    <div class="slides" role="main" id="slide-container">
        <section><p style="padding:2em;color:#999;text-align:center">載入中…</p></section>
    </div>
</div>

<article id="reading-view" hidden tabindex="-1" lang="zh-TW" aria-label="簡報閱讀版"></article>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/zoom/zoom.js"></script>
<script src="https://cdn.jsdelivr.net/gh/rajgoel/reveal.js-plugins@master/chalkboard/plugin.js"></script>
<script src="shared/slides-core.js"></script>
<script>
const params = new URLSearchParams(location.search);
const modIds = (params.get('m') || '').split(',').filter(Boolean);
const container = document.getElementById('slide-container');
const rv = document.getElementById('reading-view');

if (!modIds.length) {
    container.innerHTML = '<section><p style="padding:2em;text-align:center">請從 <a href="compose.html">compose.html</a> 選擇模組。</p></section>';
    boot();
} else {
    Promise.all(modIds.map(id =>
        fetch('modules/' + id + '.html')
            .then(r => r.ok ? r.text() : `<section><p style="color:red">模組 ${id} 載入失敗</p></section>`)
            .catch(() => `<section><p style="color:red">模組 ${id} 載入失敗</p></section>`)
    )).then(htmls => {
        container.innerHTML = htmls.join('\n');

        const slides = Array.from(container.querySelectorAll('section'));
        slides.forEach((sec, i) => {
            const clone = sec.cloneNode(true);
            const label = document.createElement('span');
            label.className = 'slide-label';
            label.textContent = `第 ${i + 1} 頁`;
            clone.insertBefore(label, clone.firstChild);
            const al = sec.getAttribute('aria-label');
            if (al) clone.setAttribute('aria-label', `第 ${i + 1} 頁：${al.replace(/^第\s*\d+\s*頁[：:]?\s*/, '')}`);
            rv.appendChild(clone);
        });

        boot();
    });
}

function boot() {
    Reveal.initialize({
        hash: false,
        slideNumber: 'c/t',
        transition: 'fade',
        transitionSpeed: 'fast',
        controls: true,
        progress: true,
        center: false,
        margin: 0.04,
        width: 1024,
        height: 720,
        navigationMode: 'linear',
        mouseWheel: true,
        plugins: [RevealZoom, RevealChalkboard],
        chalkboard: { boardmarkerWidth: 3, chalkEffect: 0.5 },
    }).then(() => {
        initSlides();
        initTOC();
        initLightbox();
    });
}

function initLightbox() {
    const overlay = document.createElement('div');
    overlay.id = 'img-lightbox';
    const img = document.createElement('img');
    overlay.appendChild(img);
    document.body.appendChild(overlay);

    const openLB = (src, alt) => { img.src = src; img.alt = alt; overlay.classList.add('open'); };
    const closeLB = () => overlay.classList.remove('open');

    // plain click on img → lightbox; Alt+click passes through to RevealZoom
    container.addEventListener('click', e => {
        if (e.altKey) return;
        const t = e.target.closest('img');
        if (!t) return;
        openLB(t.src, t.alt);
    });
    overlay.addEventListener('click', closeLB);
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) {
            closeLB();
            e.stopImmediatePropagation();
        }
    }, true);
}

function initTOC() {
    const btn = document.getElementById('toc-btn');
    const panel = document.getElementById('toc-panel');
    const overlay = document.getElementById('toc-overlay');
    const list = document.getElementById('toc-list');
    const closeBtn = document.getElementById('toc-close');

    const sections = Array.from(container.querySelectorAll('section'));
    sections.forEach((sec, i) => {
        const h2 = sec.querySelector('h2');
        const ariaLabel = sec.getAttribute('aria-label') || '';
        const title = ariaLabel || (h2 ? h2.textContent.trim() : `第 ${i + 1} 頁`);

        const li = document.createElement('li');
        const b = document.createElement('button');
        b.innerHTML = `<span class="toc-num">${i + 1}</span><span>${title}</span>`;
        b.addEventListener('click', () => {
            Reveal.slide(i);
        });
        li.appendChild(b);
        list.appendChild(li);
    });

    function openTOC() {
        panel.hidden = false;
        overlay.hidden = false;
        btn.setAttribute('aria-expanded', 'true');
        updateCurrent();
    }
    function closeTOC() {
        panel.hidden = true;
        overlay.hidden = true;
        btn.setAttribute('aria-expanded', 'false');
    }
    function updateCurrent() {
        const idx = Reveal.getState().indexh;
        list.querySelectorAll('button').forEach((b, i) => {
            b.classList.toggle('toc-current', i === idx);
        });
        const cur = list.querySelector('button.toc-current');
        if (cur) cur.scrollIntoView({ block: 'nearest' });
    }

    btn.addEventListener('click', () => { panel.hidden ? openTOC() : closeTOC(); });
    overlay.addEventListener('click', closeTOC);
    closeBtn.addEventListener('click', closeTOC);
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && !panel.hidden) closeTOC();
    });
    panel.addEventListener('wheel', e => { e.stopPropagation(); });
    Reveal.on('slidechanged', updateCurrent);
}
</script>
</body>
</html>
