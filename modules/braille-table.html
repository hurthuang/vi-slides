<section role="region" aria-label="點字表切換">
    <h2><span aria-hidden="true">⠿</span> <a href="https://github.com/hurthuang/NVDA-brailleTableSwitcher" target="_blank" rel="noopener">點字表切換 (brailleTableSwitcher)</a></h2>
    <div class="kbd-row">
        <div class="kbd-chip"><span class="keys">NVDA + Alt + B</span><span class="kdesc">循環切換輸出點字表</span></div>
        <div class="kbd-chip"><span class="keys">NVDA + Alt + I</span><span class="kdesc">循環切換輸入點字表</span></div>
        <div class="kbd-chip"><span class="keys">NVDA + Alt + O</span><span class="kdesc">報讀目前使用的點字表</span></div>
    </div>
    <div class="two-col">
        <div class="col-box">
            <h3>輸出點字表（循環）</h3>
            <ol class="step-list">
                <li>注音點字（預設）</li>
                <li>注音點字 ＋ UEB Grade 1</li>
                <li>注音點字 ＋ UEB Grade 2</li>
            </ol>
        </div>
        <div class="col-box">
            <h3>輸入點字表（循環）</h3>
            <ol class="step-list">
                <li>英文電腦點字（八點）</li>
                <li>UEB Grade 1</li>
                <li>UEB Grade 2</li>
            </ol>
        </div>
    </div>
</section>
