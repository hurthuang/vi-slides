<section role="region" aria-label="OCR 與 TTS 原理">
    <h2>OCR &amp; TTS</h2>
    <div class="two-col">
        <div class="col-box">
            <h3>OCR 光學字元辨識</h3>
            <p style="font-size:.68em">把圖片中的文字影像比對資料庫，配合詞庫，轉成可讀文字檔。</p>
            <ul>
                <li>限制：文本清晰度、數理符號、圖形</li>
            </ul>
        </div>
        <div class="col-box accent-green">
            <h3>TTS 文字轉語音</h3>
            <p style="font-size:.68em">將文字轉換為語音朗讀。</p>
            <ul>
                <li>限制：破音字、資料庫侷限、數理符號、圖形</li>
            </ul>
        </div>
    </div>
</section>
