<section role="region" aria-label="語音字典切換">
    <h2><span aria-hidden="true">🔊</span> <a href="https://github.com/hurthuang/NVDA-DictSwitcher" target="_blank" rel="noopener">語音字典切換 (DictSwitcher)</a></h2>
    <div class="kbd-row">
        <div class="kbd-chip"><span class="keys">NVDA + Alt + D</span><span class="kdesc">循環切換語音字典</span></div>
    </div>
    <div class="two-col">
        <div class="col-box">
            <h3>切換順序</h3>
            <ol class="step-list">
                <li>破音字修正</li>
                <li>注音點字</li>
                <li>數學點字</li>
                <li>停用自訂字典</li>
            </ol>
        </div>
        <div class="col-box accent-green">
            <h3>各字典說明</h3>
            <ul>
                <li><b>破音字修正</b>：修正語音引擎對破音字的錯誤讀音（如「行人」vs「銀行」）</li>
                <li><b>注音點字</b>：依注音點字規格調整語音報讀，與「報點」附加元件作用相同</li>
                <li><b>數學點字</b>：讓語音引擎正確朗讀 Nemeth 數學符號</li>
                <li><b>停用</b>：還原 NVDA 預設語音字典</li>
            </ul>
        </div>
    </div>
</section>
