<section role="region" aria-label="雙視校對與跨裝置存檔">
    <h2>雙視校對與跨裝置存檔</h2>
    <div class="flow" aria-label="工作流程">
        <div class="flow-box">輸入文字<br>或點字</div>
        <div class="flow-arr" aria-hidden="true">▶</div>
        <div class="flow-box">轉換<br>+ 手動校對</div>
        <div class="flow-arr" aria-hidden="true">▶</div>
        <div class="flow-box">匯出<br>HTML 校對檔</div>
        <div class="flow-arr" aria-hidden="true">▶</div>
        <div class="flow-box">換裝置<br>開啟繼續</div>
    </div>
    <div class="two-col">
        <div class="col-box">
            <h3>自動存檔（本機）</h3>
            <ul>
                <li>關閉分頁不遺失，下次開啟自動恢復</li>
                <li>文字轉點字、點字轉文字各自獨立存檔</li>
                <li>資料僅存於本機瀏覽器，不上傳</li>
            </ul>
        </div>
        <div class="col-box">
            <h3>HTML 校對檔（跨裝置）</h3>
            <ul>
                <li>匯出一個 HTML 檔，同時可印出紙本雙視對照，也可重新開啟繼續修編</li>
                <li>傳到另一台電腦後，用「開啟檔案」匯入</li>
                <li>所有修正紀錄完整保留</li>
            </ul>
        </div>
    </div>
</section>
