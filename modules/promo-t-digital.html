<section role="region" aria-label="重度視障生與電子檔">
    <h2>重度視障生與電子檔</h2>
    <p>使用螢幕報讀軟體（Screen Reader）</p>
    <ul>
        <li><strong>純文字（.txt）</strong>：99.9% 可報讀與轉換成點字</li>
        <li><strong>有格式的文字檔（.docx .odt .rtf）</strong>：大部份可報讀，除圖片、數學式與圖文框</li>
        <li><strong>網頁（.html）</strong>：大部份可報讀，除特殊嵌入式物件</li>
        <li><strong>其他 Office 文件</strong>：部份可報讀，需額外教學軟體操作技巧</li>
        <li><strong>PDF 檔</strong>：多數無法正常報讀，需轉檔並重新排版</li>
        <li><strong>圖片檔</strong>：需經過 OCR（光學字元辨識）後校對並重新排版</li>
    </ul>
    <p style="margin-top:.5em;color:#666;font-size:.7em">測試：<kbd style="background:#ede7f6;border-radius:3px;padding:1px 5px;font-family:monospace">Ctrl + 視窗鍵 + Enter</kbd> 開啟／關閉「朗讀程式」</p>
</section>
