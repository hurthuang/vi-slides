<section role="region" aria-label="點字格結構">
    <h2>點字</h2>
    <div style="display:flex;justify-content:center;align-items:center;gap:3em;margin:1em 0">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9em;padding:1em;border:2px solid #c8e6c9;border-radius:8px;background:#f9fbf9">
            <div style="display:flex;flex-direction:column;align-items:center;gap:.9em">
                <div style="width:2em;height:2em;border-radius:50%;background:#1b5e20;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.95em">1</div>
                <div style="width:2em;height:2em;border-radius:50%;background:#1b5e20;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.95em">2</div>
                <div style="width:2em;height:2em;border-radius:50%;background:#1b5e20;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.95em">3</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:.9em">
                <div style="width:2em;height:2em;border-radius:50%;background:#1565c0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.95em">4</div>
                <div style="width:2em;height:2em;border-radius:50%;background:#1565c0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.95em">5</div>
                <div style="width:2em;height:2em;border-radius:50%;background:#1565c0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.95em">6</div>
            </div>
        </div>
        <ul style="font-size:.85em;line-height:2.2;list-style:none;padding:0">
            <li>每格 <strong>6 個點位</strong>，排成 2 欄 3 列</li>
            <li>左欄：點 1、2、3（由上至下）</li>
            <li>右欄：點 4、5、6（由上至下）</li>
            <li>凸起的點組合代表不同字符</li>
        </ul>
    </div>
</section>
