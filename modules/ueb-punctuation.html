<section role="region" aria-label="UEB 標點符號">
    <h2>標點符號對照</h2>
    <div class="two-col">
        <div class="col-box">
            <table class="punc-table" aria-label="UEB 標點符號（左欄）">
                <thead><tr><th>符號</th><th>點字</th><th>點位</th></tr></thead>
                <tbody>
                    <tr><td>逗號 ,</td><td><span class="brl">⠂</span></td><td>點 2</td></tr>
                    <tr><td>句號 .</td><td><span class="brl">⠲</span></td><td>點 2-5-6</td></tr>
                    <tr><td>冒號 :</td><td><span class="brl">⠒</span></td><td>點 2-5</td></tr>
                    <tr><td>分號 ;</td><td><span class="brl">⠆</span></td><td>點 2-3</td></tr>
                    <tr><td>驚嘆號 !</td><td><span class="brl">⠖</span></td><td>點 2-3-5</td></tr>
                    <tr><td>問號 ?</td><td><span class="brl">⠦</span></td><td>點 2-3-6</td></tr>
                </tbody>
            </table>
        </div>
        <div class="col-box">
            <table class="punc-table" aria-label="UEB 標點符號（右欄）">
                <thead><tr><th>符號</th><th>點字</th><th>點位</th></tr></thead>
                <tbody>
                    <tr><td>撇號 '</td><td><span class="brl">⠄</span></td><td>點 3</td></tr>
                    <tr><td>前雙引號 "</td><td><span class="brl">⠦</span></td><td>點 2-3-6</td></tr>
                    <tr><td>後雙引號 "</td><td><span class="brl">⠴</span></td><td>點 3-5-6</td></tr>
                    <tr><td>左括號 (</td><td><span class="brl">⠐⠣</span></td><td>點 5 + 點 1-2-6</td></tr>
                    <tr><td>右括號 )</td><td><span class="brl">⠐⠜</span></td><td>點 5 + 點 3-4-5</td></tr>
                    <tr><td>連字號 -</td><td><span class="brl">⠤</span></td><td>點 3-6</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <p style="font-size:.64em;color:#666;margin-top:.4em">注意：問號 ? 與前雙引號 " 點字相同（⠦），由上下文判斷。</p>
</section>
